<script>
// Fondo de partículas (canvas)
(function() {
  const canvas = document.getElementById('canvasBg');
  const ctx = canvas.getContext('2d');
  let width, height, particles = [];
  function init() {
    width = window.innerWidth; height = window.innerHeight;
    canvas.width = width; canvas.height = height;
    for(let i=0;i<250;i++) particles.push({x:Math.random()*width, y:Math.random()*height, r:Math.random()*2+1, a:Math.random()*0.5+0.2, vx:(Math.random()-0.5)*0.5, vy:(Math.random()-0.5)*0.3});
    animate();
  }
  function animate() {
    if(!ctx) return;
    ctx.clearRect(0,0,width,height);
    ctx.fillStyle='#030712'; ctx.fillRect(0,0,width,height);
    for(let p of particles) {
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(139,92,246,${p.a})`; ctx.fill();
      p.x+=p.vx; p.y+=p.vy;
      if(p.x<0) p.x=width; if(p.x>width) p.x=0;
      if(p.y<0) p.y=height; if(p.y>height) p.y=0;
    }
    requestAnimationFrame(animate);
  }
  window.addEventListener('resize',()=>{ width=window.innerWidth; height=window.innerHeight; canvas.width=width; canvas.height=height; });
  init();
})();

// ========== CONFIGURACIÓN DE FIREBASE ==========
const firebaseConfig = {
  apiKey: "AIzaSyAe8GJiuflx18dSlIf1Gdm5TkNZKuBkt24",
  authDomain: "big-boos-social.firebaseapp.com",
  databaseURL: "https://big-boos-social-default-rtdb.firebaseio.com",
  projectId: "big-boos-social",
  storageBucket: "big-boos-social.firebasestorage.app",
  messagingSenderId: "98119052341",
  appId: "1:98119052341:web:d55c6f7eea6a253441d57c",
  measurementId: "G-8W4MT25VEM"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

// Referencias Firebase
const postsRef = db.ref('posts');
const storiesRef = db.ref('stories');
const gruposRef = db.ref('grupos');
const contactosRef = db.ref('contactos');
const solicitudesRef = db.ref('solicitudes');
const usuariosRef = db.ref('usuarios');
const msgsRef = db.ref('mensajes');

// Variables globales
let currentUser = null;
let profile = null;
let posts = [], stories = [], grupos = [], contactos = [], solicitudes = [];
let chatOpen = false, activeChat = null, curTab = 'feed', sbExpanded = false, searchMode = 'mired';
let anonMode = false, selectedEmoji = '😊', isRecording = false;
let adClosed = localStorage.getItem('ad_closed') === 'true';
const ADMIN_NOMBRE = "👑 Soporte BIG BOSS";
const ADMIN_EMOJI = "👑";

function showToast(msg) { let t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }
function esc(s) { return String(s||'').replace(/[&<>]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function ago(ts) { let d=Math.floor((Date.now()-ts)/1000); if(d<60) return'ahora'; if(d<3600) return Math.floor(d/60)+'m'; if(d<86400) return Math.floor(d/3600)+'h'; return Math.floor(d/86400)+'d'; }

// Autenticación
document.getElementById('loginBtn').onclick = async () => {
  const email = document.getElementById('regEmail').value.trim();
  const pass = document.getElementById('regPass').value.trim();
  const nombre = document.getElementById('regName').value.trim();
  if (!email || !pass) { showToast("Email y contraseña requeridos"); return; }
  try {
    let userCred = await auth.signInWithEmailAndPassword(email, pass);
    currentUser = userCred.user;
    let snap = await usuariosRef.child(currentUser.uid).once('value');
    if (snap.exists()) profile = snap.val();
    else profile = { nombre, emoji: selectedEmoji, puntos: 0 };
    afterLogin();
  } catch (err) {
    if (err.code === 'auth/user-not-found') {
      try {
        let userCred = await auth.createUserWithEmailAndPassword(email, pass);
        currentUser = userCred.user;
        profile = { nombre, emoji: selectedEmoji, puntos: 0 };
        await usuariosRef.child(currentUser.uid).set(profile);
        afterLogin();
      } catch(e) { showToast("Error registro: "+e.message); }
    } else { showToast("Error: "+err.message); }
  }
};

function afterLogin() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appShell').style.display = 'flex';
  document.getElementById('chatFab').style.display = 'flex';
  loadRealtimeData();
  renderFeed(); renderRight();
}

function loadRealtimeData() {
  postsRef.on('value', snap => { const d=snap.val()||{}; posts=Object.entries(d).map(([id,p])=>({...p,id})); renderFeed(); });
  storiesRef.on('value', snap => { const d=snap.val()||{}; stories=Object.entries(d).map(([id,s])=>({...s,id})); renderFeed(); });
  gruposRef.on('value', snap => { const d=snap.val()||{}; grupos=Object.entries(d).map(([id,g])=>({...g,id})); renderGroups(); });
  contactosRef.child(currentUser.uid).on('value', snap => { const d=snap.val()||{}; contactos=Object.values(d); renderRight(); });
  solicitudesRef.child(currentUser.uid).on('value', snap => { const d=snap.val()||{}; solicitudes=Object.entries(d).map(([id,s])=>({...s,id})); renderInbox(); });
}

// Funciones principales
async function publishPost(text,media,anon,poll) {
  if(!text.trim()&&!media&&!poll) return;
  const newPost = {
    text, media, author: anon?'Anónimo':profile.nombre,
    emoji: anon?'🕵️':profile.emoji, uid: anon?null:currentUser.uid,
    ts: Date.now(), r: {like:0,laugh:0,wow:0,sad:0,angry:0}, comments: []
  };
  if(poll) newPost.poll = poll;
  await postsRef.push(newPost);
  profile.puntos += 5;
  await usuariosRef.child(currentUser.uid).update({ puntos: profile.puntos });
  showToast(anon?'Publicado anónimamente':'Publicado');
}
async function addReaction(id,type) {
  let reactRef = postsRef.child(id).child('r').child(type);
  let snap = await reactRef.once('value');
  let val = (snap.val()||0)+1;
  await reactRef.set(val);
}
async function addComment(id,txt) {
  if(!txt.trim()) return;
  let commentsRef = postsRef.child(id).child('comments');
  let newComment = { author:profile.nombre, emoji:profile.emoji, txt, ts:Date.now() };
  await commentsRef.push(newComment);
}
function deletePost(id) { postsRef.child(id).remove(); }
async function votePoll(pid,idx) {
  let p = posts.find(p=>p.id==pid);
  if(p && p.poll && !p.poll.voters.includes(currentUser.uid)) {
    let optRef = postsRef.child(pid).child('poll').child('opts').child(idx);
    let snap = await optRef.once('value');
    let newVotes = (snap.val()?.v||0)+1;
    await optRef.update({ v: newVotes });
    await postsRef.child(pid).child('poll').child('voters').push(currentUser.uid);
  }
}
function makePoll() {
  let q=prompt("Pregunta de la encuesta:");
  if(!q) return;
  let opts=[];
  for(let i=1;i<=4;i++) {
    let o=prompt(`Opción ${i} (vacío termina):`);
    if(!o) break;
    opts.push(o);
  }
  if(opts.length<2) { showToast("Mínimo 2 opciones"); return; }
  publishPost(q,null,false,{q,opts:opts.map(o=>({t:o,v:0})),voters:[]});
}
async function addStory(img) {
  await storiesRef.push({ author:profile.nombre, emoji:profile.emoji, img, ts:Date.now() });
}
function viewStory(idx) {
  let s = stories[idx];
  if(!s) return;
  let div=document.createElement('div');
  div.style.cssText='position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.95);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;cursor:pointer';
  div.innerHTML=`<div>${s.author} · ${ago(s.ts)}</div>${s.img?`<img src="${s.img}" style="max-width:90%;max-height:80vh;border-radius:24px;">`:`<div style="font-size:80px">${s.emoji}</div>`}<div>Toca para cerrar</div>`;
  div.onclick=()=>div.remove();
  document.body.appendChild(div);
}
async function createGroup() {
  let n=prompt("Nombre del grupo");
  if(!n) return;
  let members=[currentUser.uid];
  let sel=prompt("Miembros (separados por coma):\n"+contactos.map(c=>c.nombre).join(', '))||'';
  let extra = sel.split(',').map(s=>s.trim()).filter(m=>m && contactos.some(c=>c.nombre===m));
  // Obtener UIDs de esos nombres (simplificado, por ahora solo guardamos nombres)
  let g = { nombre:n, creator:currentUser.uid, members, miembrosNombres:[profile.nombre, ...extra], ts:Date.now() };
  await gruposRef.push(g);
  showToast("Grupo creado");
}
function getRanking() {
  let st={};
  posts.forEach(p=>{
    if(!st[p.author]) st[p.author]={nombre:p.author, emoji:p.emoji, pts:0};
    let lk=Object.values(p.r||{}).reduce((a,b)=>a+b,0);
    st[p.author].pts+=lk*2+1;
  });
  if(profile) st[profile.nombre] = {nombre:profile.nombre, emoji:profile.emoji, pts:profile.puntos};
  return Object.values(st).sort((a,b)=>b.pts-a.pts);
}
function toggleAudioRec() {
  if(!isRecording){
    navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
      let rec=new MediaRecorder(stream);
      rec.ondataavailable=e=>{
        let blob=new Blob([e.data],{type:'audio/webm'});
        let url=URL.createObjectURL(blob);
        let a=document.createElement('a'); a.href=url; a.download='audio.webm'; a.click();
      };
      rec.start(); isRecording=true;
      setTimeout(()=>{ if(rec.state==='recording') rec.stop(); isRecording=false; showToast("Nota de voz enviada"); },5000);
      showToast("Grabando 5s...");
    }).catch(()=>showToast("Permiso denegado"));
  }
}
function startVC(chat) { showToast(`📹 Videollamada simulada con ${chat.nombre}`); }
function toggleSidebar() { sbExpanded=!sbExpanded; document.getElementById('sidebar').classList.toggle('wide', sbExpanded); }
function goTab(t) {
  curTab=t;
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('on'));
  let nb=document.getElementById('ni-'+t);
  if(nb) nb.classList.add('on');
  if(t==='feed') renderFeed();
  else if(t==='inbox') renderInbox();
  else if(t==='people') renderPeople();
  else if(t==='groups') renderGroups();
  else if(t==='ranking') renderRanking();
  else if(t==='webapps') renderWebApps();
  else if(t==='profile') renderProfile();
  renderRight();
}
function mobGoTab(t) { goTab(t); }
function toggleMobNav() { document.getElementById('mobNav').classList.toggle('open'); }
function toggleChat() { chatOpen=!chatOpen; if(!chatOpen) activeChat=null; renderChatPanel(); }
function openChat(chat) { activeChat=chat; chatOpen=true; renderChatPanel(); }
async function sendMsg(text) {
  if(!text.trim()||!activeChat) return;
  let chatId;
  if(activeChat.type==='group') chatId = 'g_'+activeChat.id;
  else chatId = [currentUser.uid, activeChat.uid].sort().join('_');
  let msg = { from:currentUser.uid, fromName:profile.nombre, text, ts:Date.now() };
  await msgsRef.child(chatId).push(msg);
}
function renderChatPanel() {
  let panel=document.getElementById('chatPanel');
  if(!chatOpen){ panel.classList.remove('open'); return; }
  panel.classList.add('open');
  if(!activeChat){
    panel.innerHTML=`<div class="chat-hdr"><div>💬 Mensajes</div><button onclick="toggleChat()">✕</button></div><div class="chat-messages">Toca un contacto para chatear</div>`;
    return;
  }
  let chatId = activeChat.type==='group' ? 'g_'+activeChat.id : [currentUser.uid, activeChat.uid].sort().join('_');
  msgsRef.child(chatId).once('value', snap=>{
    let msgsList = snap.val()||{};
    let html = `<div class="chat-hdr"><div><strong>${activeChat.nombre}</strong></div><div><button onclick="startVC(activeChat)">📹</button><button onclick="toggleAudioRec()">🎤</button><button onclick="toggleChat()">✕</button></div></div><div class="chat-messages" id="chatMsgsArea">`+
      Object.values(msgsList).map(m=>`<div class="bubble ${m.from===currentUser.uid?'bubble-out':'bubble-in'}"><div><strong>${m.fromName||'?'}</strong></div><div>${m.text}</div><div class="bubble-time">${new Date(m.ts).toLocaleTimeString()}</div></div>`).join('')+
      `</div><div class="chat-inp-area"><input class="chat-inp" id="chatInp" placeholder="Mensaje..."><button class="send-btn" onclick="sendChatMsg()">➤</button></div>`;
    panel.innerHTML=html;
    setTimeout(()=>{ let a=document.getElementById('chatMsgsArea'); if(a) a.scrollTop=a.scrollHeight; },50);
  });
}
function sendChatMsg() { let inp=document.getElementById('chatInp'); if(inp && inp.value.trim()){ sendMsg(inp.value); inp.value=''; } }
function renderFeed() {
  let offline=[];
  let storiesHtml=`<div class="stories-row"><div class="story-wrap" onclick="document.getElementById('storyInp').click()"><div class="story-ring add-story">+</div><div class="story-name">Mi story</div></div>${stories.map((s,i)=>`<div class="story-wrap" onclick="viewStory(${i})"><div class="story-ring">${s.img?`<img src="${s.img}" style="width:60px;height:60px;border-radius:18px;">`:s.emoji}</div><div class="story-name">${esc(s.author)}</div></div>`).join('')}</div><input type="file" id="storyInp" accept="image/*" style="display:none" onchange="onStoryFile(this)">`;
  let comp=`<div class="glass composer"><textarea id="ptxt" rows="2" placeholder="¿Qué estás pensando, ${esc(profile.nombre)}?"></textarea><div class="comp-actions"><button class="chip" onclick="document.getElementById('pmInp').click()">📎 Adjuntar</button><input type="file" id="pmInp" accept="image/*,video/*,audio/*" style="display:none" onchange="onPostMedia(this)"><button class="chip" onclick="makePoll()">📊 Encuesta</button><button class="chip" id="anonChip" onclick="toggleAnon()">🔒 Incógnito</button><button class="post-btn" onclick="doPost()">Publicar</button></div></div>`;
  let searchBox=`<div class="glass"><div class="search-tabs"><button class="search-tab ${searchMode==='mired'?'on':''}" onclick="searchMode='mired';renderFeed()">BIG BOSS</button><button class="search-tab ${searchMode==='google'?'on':''}" onclick="searchMode='google';renderFeed()">Google</button></div><div class="search-bar"><input id="searchInp" placeholder="Buscar..." onkeydown="if(event.key==='Enter')doSearch()"><button onclick="doSearch()">🔍</button></div><div id="searchRes"></div></div>`;
  let postsHtml=posts.map(p=>{
    let emojis=['❤️','😂','😮','😢','😡']; let types=['like','laugh','wow','sad','angry'];
    let pollHtml='';
    if(p.poll){
      let total=p.poll.opts.reduce((s,o)=>s+o.v,0);
      pollHtml=`<div style="margin:10px 0;">${p.poll.opts.map((o,i)=>`<div class="poll-opt" onclick="votePoll('${p.id}',${i})"><span>${o.t}</span><span>${total?Math.round(o.v/total*100):0}% (${o.v})</span></div>`).join('')}</div>`;
    }
    return `<div class="glass post-card"><div><strong>${p.emoji} ${esc(p.author)}</strong> · ${ago(p.ts)}</div><div>${esc(p.text)}</div>${pollHtml}<div class="post-acts">${types.map((t,i)=>`<button class="react-btn" onclick="addReaction('${p.id}','${t}')">${emojis[i]} ${p.r[t]||0}</button>`).join('')}<button onclick="deletePost('${p.id}')">🗑️</button><button onclick="toggleComments('${p.id}')">💬 ${p.comments?.length||0}</button></div><div id="cmt-${p.id}" style="display:none; margin-top:10px;">${p.comments?.map(c=>`<div><strong>${c.author}</strong>: ${c.txt}</div>`).join('')}<input id="ci-${p.id}" placeholder="Comenta..."><button onclick="addComment('${p.id}',document.getElementById('ci-${p.id}').value)">Enviar</button></div></div>`;
  }).join('');
  document.getElementById('feedCol').innerHTML = storiesHtml + comp + searchBox + (postsHtml||'<div class="glass">No hay posts aún. ¡Sé el primero!</div>');
}
function doPost() { let txt=document.getElementById('ptxt').value; if(txt) publishPost(txt, null, anonMode, null); document.getElementById('ptxt').value=''; anonMode=false; let ac=document.getElementById('anonChip'); if(ac) ac.classList.remove('on'); }
function onPostMedia(inp){ let f=inp.files[0]; if(f) showToast(`Archivo ${f.name} listo (demo)`); }
function onStoryFile(inp){ let f=inp.files[0]; if(f){ let r=new FileReader(); r.onload=e=>addStory(e.target.result); r.readAsDataURL(f); } }
function toggleAnon(){ anonMode=!anonMode; let b=document.getElementById('anonChip'); if(b) b.classList.toggle('on', anonMode); showToast(anonMode?'🔒 Modo incógnito ON':'Modo normal'); }
function toggleComments(id){ let d=document.getElementById('cmt-'+id); if(d) d.style.display=d.style.display==='none'?'block':'none'; }
function renderInbox() {
  let misSolicitudes=solicitudes.filter(s=>s.estado==='pendiente');
  let amigos=contactos;
  let html=`<div class="glass"><h3>📬 Solicitudes</h3>${misSolicitudes.map(s=>`<div>${s.fromName} quiere seguirte <button onclick="aceptarSolicitud('${s.fromUid}')">Aceptar</button></div>`).join('')||'No hay solicitudes'}</div>`;
  html+=`<div class="glass"><h3>💬 Chats</h3>${amigos.map(a=>`<div class="contact-item" onclick="openChat({type:'user',uid:'${a.uid}',nombre:'${a.nombre}',emoji:'👤'})">${a.nombre}</div>`).join('')||'No tienes amigos aún. Agrega gente desde "Gente".'}</div>`;
  document.getElementById('feedCol').innerHTML = html;
}
function renderPeople() {
  usuariosRef.once('value', snap=>{
    let others = [];
    snap.forEach(child=>{ if(child.key!==currentUser.uid) others.push({uid:child.key, ...child.val()}); });
    let html = `<div class="glass"><h3>👥 Gente</h3>${others.map(u=>`<div><strong>${u.emoji} ${u.nombre}</strong> <button onclick="enviarSolicitud('${u.uid}','${u.nombre}')">➕ Seguir</button></div>`).join('')}</div>`;
    document.getElementById('feedCol').innerHTML = html;
  });
}
function renderGroups() {
  let misGrupos = grupos.filter(g=>g.members.includes(currentUser.uid) || (g.miembrosNombres && g.miembrosNombres.includes(profile.nombre)));
  let html = `<div class="glass"><h3>Crear grupo</h3><input id="gName" placeholder="Nombre"><button onclick="createGroup()">Crear</button></div><div class="glass"><h3>Mis grupos</h3>${misGrupos.map(g=>`<div onclick="openChat({type:'group',id:'${g.id}',nombre:'${g.nombre}',emoji:'👥'})">${g.nombre}</div>`).join('')||'Ninguno'}</div>`;
  document.getElementById('feedCol').innerHTML = html;
}
function renderRanking() {
  let ranking = getRanking();
  let html = `<div class="glass"><h3>🏆 Ranking</h3>${ranking.map((r,i)=>`<div>${i+1}. ${r.emoji} ${r.nombre} - ${r.pts} pts</div>`).join('')}</div>`;
  document.getElementById('feedCol').innerHTML = html;
}
function renderWebApps() {
  let servicios=[
    {nombre:"Google", url:"https://www.google.com", icono:"🔍"},
    {nombre:"YouTube", url:"https://www.youtube.com", icono:"📺"},
    {nombre:"TikTok", url:"https://www.tiktok.com", icono:"🎵"},
    {nombre:"Facebook", url:"https://www.facebook.com", icono:"📘"},
    {nombre:"Instagram", url:"https://www.instagram.com", icono:"📸"},
    {nombre:"Gmail", url:"https://mail.google.com", icono:"📧"}
  ];
  let gridHtml=`<div class="glass"><h3>🌐 Web Apps</h3><div class="web-grid">${servicios.map(s=>`<div class="web-card"><div class="web-icon">${s.icono}</div><div class="web-name">${s.nombre}</div><button class="web-btn primary" onclick="window.open('${s.url}','_blank')">Abrir</button></div>`).join('')}</div></div>`;
  document.getElementById('feedCol').innerHTML = gridHtml;
}
function renderProfile() {
  let myP=posts.filter(p=>p.uid===currentUser.uid);
  let myL=myP.reduce((s,p)=>s+Object.values(p.r||{}).reduce((a,b)=>a+b,0),0);
  let html=`<div class="glass"><div style="font-size:48px;text-align:center">${profile.emoji}</div><div style="text-align:center;font-size:24px;">${esc(profile.nombre)}</div><div style="text-align:center;">⭐ ${profile.puntos} puntos</div><div style="display:flex;gap:8px;margin:16px 0;"><div style="flex:1;text-align:center;"><div>${myP.length}</div><div>Posts</div></div><div style="flex:1;text-align:center;"><div>${myL}</div><div>Likes</div></div></div><button class="post-btn" onclick="openDonate()" style="width:100%;margin-bottom:8px;">💚 Donar</button><button class="btn-outline danger" onclick="doLogout()">🚪 Cerrar sesión</button></div>`;
  document.getElementById('feedCol').innerHTML = html;
}
function renderRight() {
  let adHtml = !adClosed ? `<div class="ad-panel"><button class="ad-close" onclick="closeAd()">✕</button><strong>🤖 CLAUDE AI</strong><br>Asistente inteligente en el chat.<br><button class="chip" onclick="window.open('https://claude.ai','_blank')">Probar ahora</button></div>` : '';
  let topUsers = getRanking().slice(0,3);
  let topHtml = `<div class="glass"><div class="panel-lbl">🏆 TOP 3</div>${topUsers.map(u=>`<div>${u.emoji} ${u.nombre} - ${u.pts}pts</div>`).join('')}</div>`;
  let onlineHtml = `<div class="glass"><div class="panel-lbl">🟢 EN LÍNEA</div><div>Próximamente</div></div>`;
  document.getElementById('rightCol').innerHTML = adHtml + topHtml + onlineHtml;
}
function enviarSolicitud(uid, nombre) { 
  solicitudesRef.child(uid).push({ fromUid:currentUser.uid, fromName:profile.nombre, estado:'pendiente', ts:Date.now() }); 
  showToast(`Solicitud enviada a ${nombre}`); 
}
function aceptarSolicitud(fromUid) {
  // implementación básica
  showToast("Aceptada (demo)");
}
function openDonate() { document.getElementById('donateModal').classList.add('open'); }
function closeDonate() { document.getElementById('donateModal').classList.remove('open'); }
function copyDonate() { navigator.clipboard.writeText("1430001713008367380016"); showToast("CBU copiado"); closeDonate(); }
function closeAd() { adClosed=true; localStorage.setItem('ad_closed','true'); renderRight(); }
function doSearch() { let q=document.getElementById('searchInp')?.value; if(!q) return; if(searchMode==='google') window.open('https://www.google.com/search?q='+encodeURIComponent(q), '_blank'); else showToast("Búsqueda local no implementada"); }
function doLogout() { auth.signOut().then(()=>location.reload()); }
function openSettingsModal() { alert("Ajustes próximamente"); }
function resetAllData() { if(confirm("¿Borrar todos los datos? (solo locales)")) localStorage.clear(); }

// Inicialización emojis
const EMOJIS=['😊','😎','🔥','⚡','🚀','🌟','💎','👑'];
function buildEmojiGrid() { let g=document.getElementById('emojiGrid'); if(g) g.innerHTML=EMOJIS.map(e=>`<div class="emoji-pick ${e===selectedEmoji?'chosen':''}" onclick="selectedEmoji='${e}';buildEmojiGrid()">${e}</div>`).join(''); }
buildEmojiGrid();

// Exponer globales
window.goTab=goTab; window.mobGoTab=mobGoTab; window.toggleSidebar=toggleSidebar;
window.toggleChat=toggleChat; window.openChat=openChat; window.sendChatMsg=sendChatMsg;
window.startVC=startVC; window.toggleAudioRec=toggleAudioRec; window.addReaction=addReaction;
window.deletePost=deletePost; window.makePoll=makePoll; window.onPostMedia=onPostMedia;
window.onStoryFile=onStoryFile; window.doPost=doPost; window.toggleAnon=toggleAnon;
window.toggleComments=toggleComments; window.addComment=addComment; window.votePoll=votePoll;
window.enviarSolicitud=enviarSolicitud; window.aceptarSolicitud=aceptarSolicitud;
window.openDonate=openDonate; window.closeDonate=closeDonate; window.copyDonate=copyDonate;
window.closeAd=closeAd; window.toggleMobNav=toggleMobNav; window.viewStory=viewStory;
window.createGroup=createGroup; window.openSettingsModal=openSettingsModal; window.resetAllData=resetAllData;
</script>
